<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Status Board</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f1117; color: #e1e4e8; padding: 24px; }
        
        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 26px; display: flex; align-items: center; gap: 10px; }
        .header .meta { color: #8b949e; font-size: 13px; text-align: right; }
        .header .meta .time { color: #58a6ff; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #8b949e; }
        .card-status { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
        .status-clear { background: #0d3b1e; color: #3fb950; }
        .status-hit { background: #3a1b1b; color: #f85149; }
        .card-body { font-size: 15px; line-height: 1.5; min-height: 20px; }
        .card-body .muted { color: #8b949e; font-size: 13px; }
        .card-body .hit-text { color: #f85149; }
        
        .inbox-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; }
        .inbox-clear { background: #0d3b1e; border: 1px solid #1a5c30; }
        .inbox-items { background: #3a1b1b; border: 1px solid #5c1a1a; }
        .inbox-count { font-size: 24px; font-weight: 700; }
        .inbox-label { font-size: 13px; color: #8b949e; }
        
        .alerts-section { margin-top: 16px; }
        .alerts-section h3 { font-size: 15px; margin-bottom: 10px; color: #f85149; display: flex; align-items: center; gap: 8px; }
        .alert-item { background: #3a1b1b; border: 1px solid #5c1a1a; border-radius: 6px; padding: 10px 14px; margin-bottom: 6px; font-size: 14px; }
        
        .nav-links { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; padding-top: 16px; border-top: 1px solid #21262d; }
        .nav-link { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 12px 20px; text-decoration: none; color: #e1e4e8; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.15s; }
        .nav-link:hover { background: #21262d; border-color: #58a6ff; }
        .nav-link .icon { font-size: 22px; }
        .nav-link .desc { color: #8b949e; font-size: 12px; }
        
        .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: #8b949e; font-size: 18px; gap: 12px; }
        
        @media (max-width: 700px) { 
            .grid { grid-template-columns: 1fr; }
            body { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🏢 Hamburg Overhead Door</h1>
            <div class="meta" id="statusMeta">Loading...</div>
        </div>
        <div class="meta" id="lastUpdated"></div>
    </div>

    <div id="inboxStatus"></div>

    <div class="grid" id="cardGrid"></div>

    <div id="alertsSection" class="alerts-section" style="display:none;"></div>

    <div class="nav-links">
        <a href="/" class="nav-link">
            <span class="icon">📸</span>
            <div>Photo Viewer<div class="desc">Browse ticket photos</div></div>
        </a>
        <a href="/archive-dashboard.html" class="nav-link">
            <span class="icon">📋</span>
            <div>Archive Log<div class="desc">Full cron cycle details</div></div>
        </a>
    </div>

    <script>
        const apiBase = `http://${window.location.hostname}:3000/api`;

        const ruleConfig = [
            { key: 'attendance',     label: '👥 Staff Attendance',      emoji: '👥' },
            { key: 'estimator',      label: '📊 Web Estimator Leads',   emoji: '📊' },
            { key: 'schedule',       label: '📅 Service Schedule',      emoji: '📅' },
            { key: 'serviceRequests',label: '🔧 Service Requests',      emoji: '🔧' },
            { key: 'beforeAfter',    label: '📸 Before & After Photos', emoji: '📸' },
            { key: 'greensky',       label: '💰 GreenSky Financing',    emoji: '💰' },
            { key: 'jenAlert',       label: '📧 Jen Kuhn Alerts',       emoji: '📧' },
        ];

        async function loadStatus() {
            try {
                const res = await fetch(`${apiBase}/status-today`);
                const data = await res.json();
                render(data);
            } catch (err) {
                document.getElementById('cardGrid').innerHTML = 
                    `<div class="loading">⚠️ Could not load status: ${err.message}</div>`;
            }
        }

        function render(data) {
            document.getElementById('lastUpdated').innerHTML = 
                data.lastUpdated ? `🕐 Last check: <span class="time">${data.lastUpdated}</span>` : '';
            document.getElementById('statusMeta').textContent = 
                data.date ? `Status for ${data.date}` : '';

            const inboxEl = document.getElementById('inboxStatus');
            const hasActionItems = data.actionItems.length > 0;
            const hasAlerts = data.alerts.length > 0;
            const hasMatches = Object.values(data.rules).some(r => r.match);
            
            if (data.inboxEmpty && !hasMatches && !hasActionItems && !hasAlerts) {
                inboxEl.innerHTML = `<div class="inbox-row inbox-clear"><span style="font-size:28px;">✅</span><div><div class="inbox-count" style="color:#3fb950;">All Clear</div><div class="inbox-label">No new items — all information archived</div></div></div>`;
            } else if (hasAlerts || hasActionItems) {
                inboxEl.innerHTML = `<div class="inbox-row inbox-items"><span style="font-size:28px;">🔴</span><div><div class="inbox-count" style="color:#f85149;">Needs Attention</div><div class="inbox-label">${data.actionItems.length + data.alerts.length} item(s) requiring action</div></div></div>`;
            } else if (hasMatches) {
                inboxEl.innerHTML = `<div class="inbox-row inbox-items"><span style="font-size:28px;">🟡</span><div><div class="inbox-count" style="color:#f0883e;">Activity Today</div><div class="inbox-label">New items were processed this cycle</div></div></div>`;
            }

            const gridEl = document.getElementById('cardGrid');
            gridEl.innerHTML = ruleConfig.map(cfg => {
                const rule = data.rules[cfg.key];
                if (!rule) return '';
                const isHit = rule.match;
                const statusClass = isHit ? 'status-hit' : 'status-clear';
                const statusText = isHit ? '⚠️ Activity' : '✅ Clear';
                const bodyHtml = isHit 
                    ? `<span class="hit-text">${rule.detail || 'Match found'}</span>`
                    : `<span class="muted">${rule.detail || 'No activity'}</span>`;
                return `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">${cfg.label}</span>
                            <span class="card-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="card-body">${bodyHtml}</div>
                    </div>
                `;
            }).join('');

            const alertsEl = document.getElementById('alertsSection');
            if (data.alerts.length > 0 || data.actionItems.length > 0) {
                const items = [...data.alerts, ...data.actionItems];
                alertsEl.style.display = 'block';
                alertsEl.innerHTML = `
                    <h3>🔔 Notification${items.length > 1 ? 's' : ''}</h3>
                    ${items.map(a => `<div class="alert-item">${a}</div>`).join('')}
                `;
            } else {
                alertsEl.style.display = 'none';
            }
        }

        loadStatus();
        setInterval(loadStatus, 60000);
    </script>
</body>
</html>
